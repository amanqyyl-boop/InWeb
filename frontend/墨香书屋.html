<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨香书屋 - 前后端分离版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        :root {
            --bg: #f8f7f4;
            --bg-card: #ffffff;
            --bg-header: rgba(255, 255, 255, 0.85);
            --text-primary: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --accent: #b8860b;
            --accent-light: #d4a843;
            --border: #e8e4de;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-serif: 'Georgia', 'Noto Serif SC', serif;
            --font-sans: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --max-width: 1200px;
            --header-height: 70px;
            --reader-bg: #f5f0e8;
            --reader-text: #3a3a3a;
            --modal-overlay: rgba(0, 0, 0, 0.45);
            --toast-bg: #2c2c2c;
            --toast-text: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: var(--header-height);
            transition: background var(--transition), color var(--transition);
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        img { max-width: 100%; display: block; }

        body.night-mode {
            --bg: #1a1a1e;
            --bg-card: #26262b;
            --bg-header: rgba(26, 26, 30, 0.92);
            --text-primary: #e8e6e3;
            --text-secondary: #aba8a2;
            --text-muted: #6a6a6a;
            --border: #3a3a3f;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            --reader-bg: #22221e;
            --reader-text: #cdcbc6;
            --accent: #e0b34b;
            --accent-light: #f0cc7a;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --toast-bg: #e8e6e3;
            --toast-text: #1a1a1e;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: var(--bg-header);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: background var(--transition), border-color var(--transition);
        }
        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo {
            font-family: var(--font-serif);
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .logo i { font-size: 22px; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .nav-links li {
            cursor: pointer;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: color var(--transition), border-color var(--transition);
        }
        .nav-links li.active, .nav-links li:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 4px 16px 4px 18px;
            transition: border var(--transition), background var(--transition);
            max-width: 220px;
            flex: 1;
        }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 14px;
            outline: none;
            color: var(--text-primary);
            width: 100%;
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            padding: 4px 0 4px 8px;
            transition: color var(--transition);
        }
        .search-box button:hover { color: var(--accent); }
        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background var(--transition), color var(--transition);
        }
        .theme-toggle:hover { background: var(--border); color: var(--accent); }

        .user-area { display: flex; align-items: center; gap: 10px; }
        .user-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
        }
        .user-btn:hover { background: var(--accent-light); transform: scale(1.02); }
        .user-btn.outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .user-btn.outline:hover { border-color: var(--accent); color: var(--accent); }
        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            position: relative;
        }
        .user-dropdown {
            position: absolute;
            top: 44px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 0;
            min-width: 150px;
            box-shadow: var(--shadow);
            display: none;
            z-index: 100;
        }
        .user-dropdown.show { display: block; }
        .user-dropdown li {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
        }
        .user-dropdown li:hover { background: var(--bg); color: var(--accent); }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
        }

        .app-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 20px 24px 60px;
            min-height: calc(100vh - var(--header-height));
        }

        .page { display: none; animation: fadeUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero-section {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(135deg, var(--bg-card), var(--bg));
            border-radius: var(--radius);
            margin-bottom: 40px;
            border: 1px solid var(--border);
            transition: background var(--transition), border var(--transition);
        }
        .hero-section h1 { font-family: var(--font-serif); font-size: 36px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
        .hero-section p { color: var(--text-secondary); font-size: 16px; max-width: 520px; margin: 0 auto 20px; }
        .hero-search {
            display: flex;
            max-width: 460px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            overflow: hidden;
            transition: border var(--transition);
        }
        .hero-search:focus-within { border-color: var(--accent); }
        .hero-search input {
            flex: 1;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            outline: none;
            background: transparent;
            color: var(--text-primary);
        }
        .hero-search input::placeholder { color: var(--text-muted); }
        .hero-search button {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 0 28px;
            font-size: 16px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .hero-search button:hover { background: var(--accent-light); }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }
        .category-tabs .tab {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-card);
        }
        .category-tabs .tab:hover, .category-tabs .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .recommend-banner {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: var(--radius);
            padding: 20px 28px;
            margin-bottom: 28px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .recommend-banner h3 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .recommend-banner p { font-size: 14px; opacity: 0.9; }
        .recommend-banner .tag-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .recommend-banner .tag-list span {
            background: rgba(255,255,255,0.2);
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            margin: 36px 0 18px;
            font-family: var(--font-serif);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: var(--accent); font-size: 20px; }
        .section-title .badge-rec {
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: 8px;
            font-family: var(--font-sans);
            font-weight: 500;
        }

        .novel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .novel-card {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition), border var(--transition);
        }
        .novel-card:hover { transform: translateY(-6px); box-shadow: var(--shadow); }
        .novel-cover {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: linear-gradient(145deg, var(--border), var(--bg));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: var(--accent);
            position: relative;
        }
        .novel-cover .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .novel-cover .rec-tag {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(184,134,11,0.85);
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .novel-info { padding: 14px 14px 16px; }
        .novel-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .novel-info .author { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .novel-info .meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .novel-info .meta .rating { color: var(--accent); }

        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 28px; font-family: var(--font-serif); font-weight: 600; color: var(--text-primary); }
        .page-header p { color: var(--text-secondary); font-size: 15px; margin-top: 4px; }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            align-items: center;
            margin-bottom: 24px;
            padding: 14px 18px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .filter-bar label { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
        .filter-bar select {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--bg);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        .filter-bar .result-count { margin-left: auto; font-size: 13px; color: var(--text-muted); }

        .detail-header {
            display: flex;
            gap: 30px;
            padding: 30px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .detail-cover {
            width: 180px;
            aspect-ratio: 3 / 4;
            background: linear-gradient(145deg, var(--border), var(--bg));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            color: var(--accent);
            flex-shrink: 0;
        }
        .detail-meta { flex: 1; min-width: 200px; }
        .detail-meta h1 { font-size: 28px; font-family: var(--font-serif); font-weight: 700; margin-bottom: 6px; }
        .detail-meta .author { font-size: 16px; color: var(--text-secondary); margin-bottom: 10px; }
        .detail-meta .desc { color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin-bottom: 16px; max-width: 600px; }
        .detail-meta .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .detail-meta .tags span { padding: 4px 14px; border-radius: 30px; background: var(--bg); border: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
        .detail-meta .stats { display: flex; gap: 24px; font-size: 13px; color: var(--text-muted); }
        .detail-meta .stats i { margin-right: 4px; color: var(--accent); }
        .detail-actions { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
        .detail-actions .btn {
            padding: 10px 28px;
            border-radius: 40px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
        }
        .detail-actions .btn-primary { background: var(--accent); color: #fff; }
        .detail-actions .btn-primary:hover { background: var(--accent-light); }
        .detail-actions .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .detail-actions .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        .chapter-list {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px 24px;
        }
        .chapter-list h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .chapter-list h3 i { color: var(--accent); }
        .chapter-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
        .chapter-items li {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
            border: 1px solid transparent;
        }
        .chapter-items li:hover { background: var(--bg); color: var(--accent); border-color: var(--border); }

        .reader-container {
            max-width: 780px;
            margin: 0 auto;
            background: var(--reader-bg);
            padding: 40px 48px;
            border-radius: var(--radius);
            min-height: 60vh;
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .reader-container .chapter-title {
            text-align: center;
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--reader-text);
        }
        .reader-container .content {
            font-family: var(--font-serif);
            font-size: 18px;
            line-height: 1.9;
            color: var(--reader-text);
            letter-spacing: 0.02em;
        }
        .reader-container .content p { text-indent: 2em; margin-bottom: 1.2em; }
        .reader-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .reader-controls .btn {
            padding: 8px 22px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
        }
        .reader-controls .btn:hover { border-color: var(--accent); color: var(--accent); }
        .reader-controls .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .reader-controls .ch-info { font-size: 14px; color: var(--text-muted); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(6px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 36px 40px 32px;
            max-width: 460px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal h2 { font-size: 24px; font-weight: 600; margin-bottom: 6px; font-family: var(--font-serif); color: var(--accent); }
        .modal .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
        .modal .form-group input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--bg);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border var(--transition);
        }
        .modal .form-group input:focus { border-color: var(--accent); }
        .modal .form-group .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .pref-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .pref-tags .ptag {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg);
            color: var(--text-secondary);
            user-select: none;
        }
        .pref-tags .ptag.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
        .pref-tags .ptag:hover { border-color: var(--accent); }
        .modal .btn-block {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
            margin-top: 8px;
        }
        .modal .btn-block:hover { background: var(--accent-light); }
        .modal .switch-action { text-align: center; margin-top: 14px; font-size: 14px; color: var(--text-muted); }
        .modal .switch-action span { color: var(--accent); cursor: pointer; font-weight: 500; }
        .modal .switch-action span:hover { text-decoration: underline; }
        .modal .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color var(--transition);
            line-height: 1;
        }
        .modal .close-modal:hover { color: var(--text-primary); }

        .toast-container {
            position: fixed;
            top: 90px;
            right: 24px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 22px;
            border-radius: var(--radius-sm);
            background: var(--toast-bg);
            color: var(--toast-text);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.8s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 340px;
        }
        .toast.success { border-left: 4px solid #4caf50; }
        .toast.error { border-left: 4px solid #e74c3c; }
        .toast.info { border-left: 4px solid var(--accent); }
        @keyframes toastIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(60px); } }

        .back-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(184,134,11,0.3);
            transition: transform var(--transition), opacity var(--transition);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }
        .back-top.visible { opacity: 1; pointer-events: auto; }
        .back-top:hover { transform: scale(1.08); }

        @media (max-width:820px) {
            .nav-links { gap: 16px; font-size: 14px; }
            .search-box { max-width: 140px; }
            .detail-header { flex-direction: column; align-items: center; text-align: center; }
            .detail-meta .desc { margin: 0 auto 16px; }
            .detail-meta .stats { justify-content: center; }
            .detail-actions { justify-content: center; }
            .reader-container { padding: 24px 20px; }
            .reader-container .chapter-title { font-size: 22px; }
            .reader-container .content { font-size: 16px; }
            .hero-section h1 { font-size: 28px; }
            .modal { padding: 28px 24px; }
        }
        @media (max-width:640px) {
            :root { --header-height: 60px; }
            .header-inner { padding: 0 16px; }
            .nav-links {
                display: none;
                position: absolute;
                top: var(--header-height);
                left: 0;
                width: 100%;
                background: var(--bg-header);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 16px 24px;
                border-bottom: 1px solid var(--border);
                gap: 18px;
                font-size: 16px;
            }
            .nav-links.open { display: flex; }
            .mobile-menu-btn { display: block; }
            .search-box { max-width: 120px; }
            .novel-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
            .app-container { padding: 12px 16px 40px; }
            .hero-section { padding: 24px 16px; }
            .hero-section h1 { font-size: 24px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-bar .result-count { margin-left: 0; }
            .chapter-items { grid-template-columns: 1fr; }
            .reader-controls { flex-direction: column; align-items: stretch; }
            .detail-cover { width: 140px; }
            .back-top { bottom: 16px; right: 16px; width: 38px; height: 38px; font-size: 15px; }
            .modal { padding: 24px 18px; }
            .recommend-banner { padding: 16px 20px; }
            .recommend-banner h3 { font-size: 17px; }
        }
        @media (max-width:420px) {
            .novel-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .novel-info h3 { font-size: 14px; }
            .novel-info .author { font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="header-inner">
            <div class="logo" data-nav="home"><i class="fas fa-book-open"></i> 墨香书屋</div>
            <ul class="nav-links" id="navLinks">
                <li class="active" data-page="home">首页</li>
                <li data-page="category">书库</li>
                <li data-page="detail" id="navDetail" style="display:none;">详情</li>
                <li data-page="reader" id="navReader" style="display:none;">阅读</li>
            </ul>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜小说..." />
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                <div class="user-area" id="userArea">
                    <button class="user-btn outline" id="loginBtn">登录</button>
                    <button class="user-btn" id="registerBtn">注册</button>
                    <div class="user-avatar" id="userAvatar" style="display:none;">
                        <span id="avatarLetter">U</span>
                        <ul class="user-dropdown" id="userDropdown">
                            <li id="dropdownProfile">我的偏好</li>
                            <li id="dropdownHistory">浏览记录</li>
                            <li id="dropdownLogout">退出登录</li>
                        </ul>
                    </div>
                </div>
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <!-- 首页 -->
        <section class="page active" id="page-home">
            <div class="hero-section">
                <h1>📖 沉浸书香，阅见世界</h1>
                <p>海量优质小说，智能推荐给你最爱的故事。</p>
                <div class="hero-search">
                    <input type="text" id="heroSearchInput" placeholder="搜索小说名、作者..." />
                    <button id="heroSearchBtn"><i class="fas fa-arrow-right"></i></button>
                </div>
                <div class="category-tabs" id="homeCategoryTabs">
                    <span class="tab active" data-cat="all">全部</span>
                    <span class="tab" data-cat="玄幻">玄幻</span>
                    <span class="tab" data-cat="仙侠">仙侠</span>
                    <span class="tab" data-cat="都市">都市</span>
                    <span class="tab" data-cat="言情">言情</span>
                    <span class="tab" data-cat="历史">历史</span>
                    <span class="tab" data-cat="科幻">科幻</span>
                    <span class="tab" data-cat="悬疑">悬疑</span>
                </div>
            </div>
            <div id="recommendSection" style="display:none;">
                <div class="recommend-banner" id="recommendBanner">
                    <div>
                        <h3><i class="fas fa-brain"></i> 为你推荐</h3>
                        <p>基于你的阅读偏好和浏览历史，精心挑选</p>
                    </div>
                    <div class="tag-list" id="recommendTags"></div>
                </div>
                <div class="section-title"><i class="fas fa-star"></i> 猜你喜欢 <span class="badge-rec">智能</span></div>
                <div class="novel-grid" id="recommendGrid"></div>
            </div>
            <div class="section-title"><i class="fas fa-fire"></i> 热门推荐</div>
            <div class="novel-grid" id="hotGrid"></div>
            <div class="section-title"><i class="fas fa-medal"></i> 高分佳作</div>
            <div class="novel-grid" id="topGrid"></div>
        </section>

        <!-- 分类页 -->
        <section class="page" id="page-category">
            <div class="page-header">
                <h2>📚 全部书库</h2>
                <p>筛选你喜欢的类型和风格</p>
            </div>
            <div class="filter-bar">
                <label>分类</label>
                <select id="catFilter">
                    <option value="all">全部</option>
                    <option value="玄幻">玄幻</option>
                    <option value="仙侠">仙侠</option>
                    <option value="都市">都市</option>
                    <option value="言情">言情</option>
                    <option value="历史">历史</option>
                    <option value="科幻">科幻</option>
                    <option value="悬疑">悬疑</option>
                </select>
                <label>排序</label>
                <select id="sortFilter">
                    <option value="hot">热门</option>
                    <option value="rating">评分</option>
                    <option value="new">最新</option>
                </select>
                <span class="result-count" id="resultCount">共 0 部</span>
            </div>
            <div class="novel-grid" id="categoryGrid"></div>
        </section>

        <!-- 详情页 -->
        <section class="page" id="page-detail">
            <div class="detail-header" id="detailHeader"></div>
            <div class="chapter-list">
                <h3><i class="fas fa-list"></i> 章节列表</h3>
                <ul class="chapter-items" id="chapterItems"></ul>
            </div>
        </section>

        <!-- 阅读器 -->
        <section class="page" id="page-reader">
            <div class="reader-container" id="readerContainer">
                <div class="chapter-title" id="readerChapterTitle">第一章 序章</div>
                <div class="content" id="readerContent"><p>内容加载中...</p></div>
                <div class="reader-controls">
                    <button class="btn" id="prevChapter"><i class="fas fa-chevron-left"></i> 上一章</button>
                    <span class="ch-info" id="readerChInfo">1 / 10</span>
                    <button class="btn" id="nextChapter">下一章 <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </section>
    </main>

    <button class="back-top" id="backTop"><i class="fas fa-arrow-up"></i></button>
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

    <script>
        // ======== 全局配置 ========
        const API_BASE = 'http://127.0.0.1:5000/api';

        // ======== 状态 ========
        const state = {
            novels: [],
            currentPage: 'home',
            currentNovelId: null,
            currentChapterIndex: 0,
            categoryFilter: 'all',
            catFilter: 'all',
            sortFilter: 'hot',
            isNight: false,
            currentUser: null,
        };

        // ======== DOM 引用 ========
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);
        const pages = {
            home: $('#page-home'),
            category: $('#page-category'),
            detail: $('#page-detail'),
            reader: $('#page-reader'),
        };
        const navLinks = $$('.nav-links li');
        const navDetail = $('#navDetail');
        const navReader = $('#navReader');
        const hotGrid = $('#hotGrid');
        const topGrid = $('#topGrid');
        const categoryGrid = $('#categoryGrid');
        const resultCount = $('#resultCount');
        const recommendGrid = $('#recommendGrid');
        const recommendSection = $('#recommendSection');
        const recommendTags = $('#recommendTags');
        const detailHeader = $('#detailHeader');
        const chapterItems = $('#chapterItems');
        const readerChapterTitle = $('#readerChapterTitle');
        const readerContent = $('#readerContent');
        const readerChInfo = $('#readerChInfo');
        const prevChapterBtn = $('#prevChapter');
        const nextChapterBtn = $('#nextChapter');
        const searchInput = $('#searchInput');
        const heroSearchInput = $('#heroSearchInput');
        const searchBtn = $('#searchBtn');
        const heroSearchBtn = $('#heroSearchBtn');
        const themeToggle = $('#themeToggle');
        const backTop = $('#backTop');
        const mobileMenuBtn = $('#mobileMenuBtn');
        const navLinksEl = $('#navLinks');
        const homeCategoryTabs = $$('#homeCategoryTabs .tab');
        const catFilter = $('#catFilter');
        const sortFilter = $('#sortFilter');
        const loginBtn = $('#loginBtn');
        const registerBtn = $('#registerBtn');
        const userAvatar = $('#userAvatar');
        const avatarLetter = $('#avatarLetter');
        const userDropdown = $('#userDropdown');
        const dropdownProfile = $('#dropdownProfile');
        const dropdownHistory = $('#dropdownHistory');
        const dropdownLogout = $('#dropdownLogout');
        const modalOverlay = $('#modalOverlay');
        const modalContent = $('#modalContent');
        const toastContainer = $('#toastContainer');

        // ======== 工具函数 ========
        function renderGrid(gridEl, novels, isRecommend = false) {
            if (!novels.length) {
                gridEl.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">暂无结果</div>`;
                return;
            }
            gridEl.innerHTML = novels.map(n => {
                const badge = n.rating >= 9 ? '<span class="badge">神作</span>' : '';
                const recTag = isRecommend ? '<span class="rec-tag"><i class="fas fa-star"></i> 推荐</span>' : '';
                return `<div class="novel-card" data-id="${n.id}">
                    <div class="novel-cover">${n.cover}${badge}${recTag}</div>
                    <div class="novel-info">
                        <h3>${n.title}</h3>
                        <div class="author">${n.author}</div>
                        <div class="meta">
                            <span class="rating"><i class="fas fa-star"></i> ${n.rating}</span>
                            <span>${n.category}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
            gridEl.querySelectorAll('.novel-card').forEach(card => {
                card.addEventListener('click', () => openDetail(card.dataset.id));
            });
        }

        function showToast(message, type = 'info') {
            const icons = { success: '<i class="fas fa-check-circle"></i>', error: '<i class="fas fa-exclamation-circle"></i>', info: '<i class="fas fa-info-circle"></i>' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `${icons[type]||icons.info} ${message}`;
            toastContainer.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3200);
        }

        function closeModal() { modalOverlay.classList.remove('show'); }
        function openModal(html) { modalContent.innerHTML = html; modalOverlay.classList.add('show'); }

        // ======== API 调用 ========
        async function api(url, options = {}) {
            try {
                const res = await fetch(API_BASE + url, {
                    headers: { 'Content-Type': 'application/json', ...options.headers },
                    ...options
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '请求失败');
                return data;
            } catch (e) {
                showToast(e.message, 'error');
                throw e;
            }
        }

        async function loadNovels(category = 'all', sort = 'hot') {
            return await api(`/novels?category=${category}&sort=${sort}`);
        }

        async function loadRecommend() {
            if (!state.currentUser) return;
            const recs = await api(`/recommend/${state.currentUser.id}`);
            renderGrid(recommendGrid, recs, true);
        }

        // ======== 页面渲染 ========
        async function renderHome() {
            let hot = await loadNovels(state.categoryFilter, 'hot');
            hot = hot.slice(0, 6);
            let top = await loadNovels(state.categoryFilter, 'rating');
            top = top.slice(0, 6);
            renderGrid(hotGrid, hot);
            renderGrid(topGrid, top);
            if (state.currentUser) {
                recommendSection.style.display = 'block';
                const prefs = state.currentUser.preferences || [];
                recommendTags.innerHTML = prefs.map(p => `<span>${p}</span>`).join('');
                await loadRecommend();
            } else {
                recommendSection.style.display = 'none';
            }
            homeCategoryTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.cat === state.categoryFilter));
        }

        async function renderCategory() {
            let list = await loadNovels(state.catFilter, state.sortFilter);
            resultCount.textContent = `共 ${list.length} 部`;
            renderGrid(categoryGrid, list);
            catFilter.value = state.catFilter;
            sortFilter.value = state.sortFilter;
        }

        async function openDetail(id) {
            state.currentNovelId = id;
            state.currentChapterIndex = 0;
            if (state.currentUser) {
                await api('/browse', { method: 'POST', body: JSON.stringify({ user_id: state.currentUser.id, novel_id: id }) });
            }
            const novel = await api(`/novels/${id}`);
            detailHeader.innerHTML = `
                <div class="detail-cover">${novel.cover}</div>
                <div class="detail-meta">
                    <h1>${novel.title}</h1>
                    <div class="author">${novel.author}</div>
                    <div class="desc">${novel.desc}</div>
                    <div class="tags"><span>${novel.category}</span><span>评分 ${novel.rating}</span></div>
                    <div class="stats">
                        <span><i class="fas fa-fire"></i> ${novel.hot} 人气</span>
                        <span><i class="fas fa-book"></i> ${novel.chapters.length} 章</span>
                    </div>
                    <div class="detail-actions">
                        <button class="btn btn-primary" id="startReadBtn"><i class="fas fa-book-open"></i> 开始阅读</button>
                        <button class="btn btn-secondary"><i class="fas fa-plus"></i> 加入书架</button>
                    </div>
                </div>`;
            detailHeader.querySelector('#startReadBtn').addEventListener('click', () => openReader(novel.id, 0));
            chapterItems.innerHTML = novel.chapters.map((ch, i) => `<li data-index="${i}">${ch}</li>`).join('');
            chapterItems.querySelectorAll('li').forEach(li => {
                li.addEventListener('click', () => openReader(novel.id, parseInt(li.dataset.index)));
            });
            navigateTo('detail');
        }

        function openReader(id, idx) {
            state.currentNovelId = id;
            state.currentChapterIndex = idx;
            navigateTo('reader');
            renderReader();
        }

        async function renderReader() {
            const novel = await api(`/novels/${state.currentNovelId}`);
            const idx = state.currentChapterIndex;
            const chTitle = novel.chapters[idx] || '未知章节';
            readerChapterTitle.textContent = chTitle;
            readerChInfo.textContent = `${idx+1} / ${novel.chapters.length}`;
            const paragraphs = [
                `${novel.title} · ${chTitle}`,
                `${novel.desc}`,
                '『墨香书屋』为您呈现精彩内容。',
                '窗外细雨霏霏，屋檐滴水成线。',
                '他抬手轻轻翻过一页，仿佛掀开了一段尘封的岁月。',
                '“你来了。”一个低沉的声音从暗处传来。',
                '脚步停住，他没有回头，只是淡淡道：“我来了。”',
                '风从窗缝中挤进来，灯焰摇晃，墙上的影子也随之扭曲……',
                '（以上内容为AI生成示例，实际小说请以正式版本为准。）',
                '—— 未完待续 ——',
            ];
            readerContent.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
            prevChapterBtn.disabled = idx <= 0;
            nextChapterBtn.disabled = idx >= novel.chapters.length - 1;
        }

        // ======== 导航 ========
        function navigateTo(page) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            if (pages[page]) pages[page].classList.add('active');
            state.currentPage = page;
            navLinks.forEach(li => li.classList.toggle('active', li.dataset.page === page));
            navDetail.style.display = (page === 'detail') ? 'block' : 'none';
            navReader.style.display = (page === 'reader') ? 'block' : 'none';
            navLinksEl.classList.remove('open');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (page === 'home') renderHome();
            else if (page === 'category') renderCategory();
            else if (page === 'reader') renderReader();
        }

        // ======== 用户系统 ========
        async function register(username, password, preferences) {
            try {
                const user = await api('/register', { method: 'POST', body: JSON.stringify({ username, password, preferences }) });
                state.currentUser = user;
                sessionStorage.setItem('userId', user.id);
                updateUserUI();
                showToast('注册成功', 'success');
                closeModal();
                renderHome();
                return true;
            } catch { return false; }
        }

        async function login(username, password) {
            try {
                const user = await api('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
                state.currentUser = user;
                sessionStorage.setItem('userId', user.id);
                updateUserUI();
                showToast('登录成功', 'success');
                closeModal();
                renderHome();
                return true;
            } catch { return false; }
        }

        function logout() {
            state.currentUser = null;
            sessionStorage.removeItem('userId');
            updateUserUI();
            showToast('已退出登录', 'info');
            closeDropdown();
            if (state.currentPage === 'detail' || state.currentPage === 'reader') navigateTo('home');
            renderHome();
        }

        async function updatePreferences(preferences) {
            try {
                const data = await api(`/user/${state.currentUser.id}/preferences`, { method: 'PUT', body: JSON.stringify({ preferences }) });
                state.currentUser.preferences = data.preferences;
                showToast('偏好已更新', 'success');
                closeModal();
                renderHome();
            } catch {}
        }

        function updateUserUI() {
            const user = state.currentUser;
            if (user) {
                loginBtn.style.display = 'none';
                registerBtn.style.display = 'none';
                userAvatar.style.display = 'flex';
                avatarLetter.textContent = user.username.charAt(0).toUpperCase();
                recommendSection.style.display = 'block';
            } else {
                loginBtn.style.display = 'inline-block';
                registerBtn.style.display = 'inline-block';
                userAvatar.style.display = 'none';
                recommendSection.style.display = 'none';
            }
        }

        async function restoreSession() {
            const userId = sessionStorage.getItem('userId');
            if (userId) {
                try {
                    const user = await api(`/user/${userId}`);
                    state.currentUser = user;
                    updateUserUI();
                    renderHome();
                } catch {
                    sessionStorage.removeItem('userId');
                }
            }
        }

        function closeDropdown() { userDropdown.classList.remove('show'); }

        // ======== 模态框 ========
        const ALL_CATEGORIES = ['玄幻', '仙侠', '都市', '言情', '历史', '科幻', '悬疑'];

        function showRegisterModal() {
            const tagsHtml = ALL_CATEGORIES.map(c => `<span class="ptag" data-tag="${c}">${c}</span>`).join('');
            openModal(`
                <button class="close-modal" id="modalCloseBtn">&times;</button>
                <h2>📝 注册账号</h2>
                <div class="subtitle">加入墨香书屋，享受个性化推荐</div>
                <div class="form-group"><label>用户名</label><input type="text" id="regUsername" placeholder="请输入用户名" /></div>
                <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="至少3位密码" /></div>
                <div class="form-group">
                    <label>偏好类型（至少选2项）</label>
                    <div class="pref-tags" id="regPrefTags">${tagsHtml}</div>
                    <div class="hint" id="regPrefHint">已选择 0 项</div>
                </div>
                <button class="btn-block" id="regSubmitBtn">注册并开启推荐</button>
                <div class="switch-action">已有账号？ <span id="switchToLogin">去登录</span></div>
            `);
            const selected = new Set();
            const tagEls = modalContent.querySelectorAll('#regPrefTags .ptag');
            const hint = modalContent.querySelector('#regPrefHint');
            tagEls.forEach(el => {
                el.addEventListener('click', () => {
                    const tag = el.dataset.tag;
                    if (selected.has(tag)) { selected.delete(tag); el.classList.remove('selected'); }
                    else { selected.add(tag); el.classList.add('selected'); }
                    hint.textContent = `已选择 ${selected.size} 项`;
                });
            });
            modalContent.querySelector('#regSubmitBtn').addEventListener('click', () => {
                const username = modalContent.querySelector('#regUsername').value.trim();
                const password = modalContent.querySelector('#regPassword').value;
                register(username, password, Array.from(selected));
            });
            modalContent.querySelector('#switchToLogin').addEventListener('click', showLoginModal);
            modalContent.querySelector('#modalCloseBtn').addEventListener('click', closeModal);
        }

        function showLoginModal() {
            openModal(`
                <button class="close-modal" id="modalCloseBtn">&times;</button>
                <h2>🔑 登录</h2>
                <div class="subtitle">欢迎回来</div>
                <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名" /></div>
                <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" /></div>
                <button class="btn-block" id="loginSubmitBtn">登录</button>
                <div class="switch-action">还没有账号？ <span id="switchToRegister">去注册</span></div>
            `);
            modalContent.querySelector('#loginSubmitBtn').addEventListener('click', () => {
                const username = modalContent.querySelector('#loginUsername').value.trim();
                const password = modalContent.querySelector('#loginPassword').value;
                login(username, password);
            });
            modalContent.querySelector('#switchToRegister').addEventListener('click', showRegisterModal);
            modalContent.querySelector('#modalCloseBtn').addEventListener('click', closeModal);
        }

        function showPreferenceModal() {
            if (!state.currentUser) return;
            const currentPrefs = state.currentUser.preferences || [];
            const tagsHtml = ALL_CATEGORIES.map(c => `<span class="ptag ${currentPrefs.includes(c) ? 'selected' : ''}" data-tag="${c}">${c}</span>`).join('');
            openModal(`
                <button class="close-modal" id="modalCloseBtn">&times;</button>
                <h2>🎯 我的偏好</h2>
                <div class="subtitle">选择你喜欢的类型</div>
                <div class="form-group">
                    <label>偏好类型（至少选2项）</label>
                    <div class="pref-tags" id="prefEditTags">${tagsHtml}</div>
                    <div class="hint" id="prefEditHint">已选择 ${currentPrefs.length} 项</div>
                </div>
                <button class="btn-block" id="prefSaveBtn">保存偏好</button>
            `);
            const selected = new Set(currentPrefs);
            const tagEls = modalContent.querySelectorAll('#prefEditTags .ptag');
            const hint = modalContent.querySelector('#prefEditHint');
            tagEls.forEach(el => {
                el.addEventListener('click', () => {
                    const tag = el.dataset.tag;
                    if (selected.has(tag)) { selected.delete(tag); el.classList.remove('selected'); }
                    else { selected.add(tag); el.classList.add('selected'); }
                    hint.textContent = `已选择 ${selected.size} 项`;
                });
            });
            modalContent.querySelector('#prefSaveBtn').addEventListener('click', () => updatePreferences(Array.from(selected)));
            modalContent.querySelector('#modalCloseBtn').addEventListener('click', closeModal);
        }

        async function showHistoryModal() {
            if (!state.currentUser) return;
            const novels = await api(`/history/${state.currentUser.id}`);
            let listHtml = '';
            if (novels.length === 0) {
                listHtml = '<p style="color:var(--text-muted);padding:20px 0;">还没有浏览记录</p>';
            } else {
                listHtml = novels.map(n => `
                    <div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" data-id="${n.id}">
                        <span style="font-size:28px;">${n.cover}</span>
                        <div><strong>${n.title}</strong><div style="font-size:13px;color:var(--text-muted);">${n.author} · ${n.category}</div></div>
                    </div>
                `).join('');
            }
            openModal(`
                <button class="close-modal" id="modalCloseBtn">&times;</button>
                <h2>📖 浏览记录</h2>
                <div class="subtitle">最近阅读过的小说 (最多20条)</div>
                <div style="max-height:400px;overflow-y:auto;">${listHtml}</div>
            `);
            modalContent.querySelectorAll('[data-id]').forEach(el => {
                el.addEventListener('click', () => { closeModal(); openDetail(el.dataset.id); });
            });
            modalContent.querySelector('#modalCloseBtn').addEventListener('click', closeModal);
        }

        // ======== 事件绑定 ========
        navLinks.forEach(li => li.addEventListener('click', () => { if (pages[li.dataset.page]) navigateTo(li.dataset.page); }));
        document.querySelector('.logo').addEventListener('click', () => navigateTo('home'));

        homeCategoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                state.categoryFilter = tab.dataset.cat;
                homeCategoryTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderHome();
            });
        });

        catFilter.addEventListener('change', () => { state.catFilter = catFilter.value; renderCategory(); });
        sortFilter.addEventListener('change', () => { state.sortFilter = sortFilter.value; renderCategory(); });

        function performSearch(query) {
            if (!query.trim()) return;
            state.catFilter = 'all';
            state.sortFilter = 'hot';
            catFilter.value = 'all';
            sortFilter.value = 'hot';
            loadNovels('all', 'hot').then(all => {
                const filtered = all.filter(n => n.title.includes(query) || n.author.includes(query));
                renderGrid(categoryGrid, filtered);
                resultCount.textContent = `搜索 "${query}" 共 ${filtered.length} 部`;
                navigateTo('category');
            });
        }
        searchBtn.addEventListener('click', () => performSearch(searchInput.value));
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') performSearch(searchInput.value); });
        heroSearchBtn.addEventListener('click', () => performSearch(heroSearchInput.value));
        heroSearchInput.addEventListener('keydown', e => { if (e.key === 'Enter') performSearch(heroSearchInput.value); });

        prevChapterBtn.addEventListener('click', () => {
            if (state.currentChapterIndex > 0) { state.currentChapterIndex--; renderReader(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        });
        nextChapterBtn.addEventListener('click', () => {
            const novelPromise = api(`/novels/${state.currentNovelId}`);
            novelPromise.then(novel => {
                if (state.currentChapterIndex < novel.chapters.length - 1) { state.currentChapterIndex++; renderReader(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
            });
        });

        themeToggle.addEventListener('click', () => {
            state.isNight = !state.isNight;
            document.body.classList.toggle('night-mode', state.isNight);
            themeToggle.innerHTML = state.isNight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('mxsw_night', state.isNight);
        });
        if (localStorage.getItem('mxsw_night') === 'true') {
            state.isNight = true;
            document.body.classList.add('night-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        window.addEventListener('scroll', () => backTop.classList.toggle('visible', window.scrollY > 400));
        backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        mobileMenuBtn.addEventListener('click', () => navLinksEl.classList.toggle('open'));
        document.addEventListener('click', e => { if (!e.target.closest('.header')) navLinksEl.classList.remove('open'); });

        loginBtn.addEventListener('click', showLoginModal);
        registerBtn.addEventListener('click', showRegisterModal);
        userAvatar.addEventListener('click', e => { e.stopPropagation(); userDropdown.classList.toggle('show'); });
        document.addEventListener('click', () => userDropdown.classList.remove('show'));
        dropdownProfile.addEventListener('click', () => { closeDropdown(); showPreferenceModal(); });
        dropdownHistory.addEventListener('click', () => { closeDropdown(); showHistoryModal(); });
        dropdownLogout.addEventListener('click', () => { closeDropdown(); logout(); });

        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

        document.addEventListener('keydown', e => {
            if (state.currentPage === 'reader') {
                if (e.key === 'ArrowLeft' || e.key === 'a') { prevChapterBtn.click(); e.preventDefault(); }
                else if (e.key === 'ArrowRight' || e.key === 'd') { nextChapterBtn.click(); e.preventDefault(); }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
            if (e.key === 'Escape') closeModal();
        });

        // ======== 初始化 ========
        restoreSession().then(() => {
            navigateTo('home');
        });
    </script>
</body>
</html>
